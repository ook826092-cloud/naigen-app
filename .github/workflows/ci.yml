name: CI

# ─────────────────────────────────────────────────────────────────────────────
# 编译验证工作流：push 到 main / PR 时触发，只验证能否编译，不做版本号自增、不签名、不发布。
#   - 想发版请用 "Build & Release" 工作流（手动触发）
# ─────────────────────────────────────────────────────────────────────────────
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Build Verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.9'
          cache-read-only: false

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Run Unit Tests
        run: ./gradlew testDebugUnitTest --no-daemon --stacktrace

      - name: Run Lint (non-blocking)
        continue-on-error: true
        run: ./gradlew lintRelease --no-daemon

      - name: Upload lint reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-reports
          path: |
            app/build/reports/lint-results-*.html
            app/build/reports/lint-results-*.xml
          retention-days: 7

      # assembleRelease 无签名 secrets 时会 fallback 到 debug 签名，
      # 仍能验证 release 变体（含 R8 混淆压缩）是否可编译
      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ci-apk
          path: app/build/outputs/apk/release/*.apk
          retention-days: 7
