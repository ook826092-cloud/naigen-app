name: Build & Release

# ─────────────────────────────────────────────────────────────────────────────
# 触发条件：仅手动触发
#   - 想发版时到 Actions 页面点 "Run workflow"
#   - 可选输入 skip_bump 跳过版本号自增
# ─────────────────────────────────────────────────────────────────────────────
on:
  workflow_dispatch:
    inputs:
      skip_bump:
        description: '跳过版本号自增（仅本次）'
        required: false
        default: 'false'
        type: choice
        options: [ 'false', 'true' ]

permissions:
  contents: write
  actions: write

concurrency:
  group: build-release-${{ github.ref }}
  cancel-in-progress: false

# ─────────────────────────────────────────────────────────────────────────────
# 需要的 Secrets（在仓库 Settings → Secrets and variables → Actions 配置）：
#   SIGNING_KEYSTORE_BASE64  → base64 编码的 PKCS12 keystore 文件
#   SIGNING_STORE_PASSWORD   → keystore 密码
#   SIGNING_KEY_ALIAS        → key alias
#   SIGNING_KEY_PASSWORD     → key 密码
# ─────────────────────────────────────────────────────────────────────────────

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Job 1：自增版本号 + 提交回仓库
  # ──────────────────────────────────────────────────────────────────────────
  bump-version:
    name: Bump Version
    runs-on: ubuntu-latest
    outputs:
      version_name: ${{ steps.read_version.outputs.VERSION_NAME }}
      version_code: ${{ steps.read_version.outputs.VERSION_CODE }}
      build_number: ${{ steps.read_version.outputs.BUILD_NUMBER }}
      semver: ${{ steps.read_version.outputs.SEMVER }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump version (BUILD_NUMBER +1, SemVer 逢 9 进位)
        # 手动触发时 bump 版本号并 commit 回仓库；
        # 可选输入 skip_bump=true 跳过版本号自增（仅本次）
        if: github.event.inputs.skip_bump != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash scripts/bump-version.sh --commit

      - name: Read final version
        id: read_version
        run: |
          # 双层格式: BUILD_NUMBER / MAJOR.MINOR.PATCH
          BUILD=$(awk -F= '/^BUILD_NUMBER=/{print $2}' version.properties)
          MAJOR=$(awk -F= '/^MAJOR=/{print $2}' version.properties)
          MINOR=$(awk -F= '/^MINOR=/{print $2}' version.properties)
          PATCH=$(awk -F= '/^PATCH=/{print $2}' version.properties)
          SEMVER="${MAJOR}.${MINOR}.${PATCH}"
          NAME="${BUILD}/${SEMVER}"
          CODE=$BUILD
          echo "BUILD_NUMBER=$BUILD"     >> "$GITHUB_OUTPUT"
          echo "SEMVER=$SEMVER"          >> "$GITHUB_OUTPUT"
          echo "VERSION_NAME=$NAME"      >> "$GITHUB_OUTPUT"
          echo "VERSION_CODE=$CODE"      >> "$GITHUB_OUTPUT"
          echo "Final version: $NAME (versionCode=$CODE)"

  # ──────────────────────────────────────────────────────────────────────────
  # Job 2：拉最新代码 + 编译 Debug + Release APK
  # ──────────────────────────────────────────────────────────────────────────
  build:
    name: Build APK
    runs-on: ubuntu-latest
    needs: bump-version
    steps:
      - name: Checkout (latest, including bump commit)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.9'
          cache-read-only: false

      - name: Run Unit Tests
        run: ./gradlew testDebugUnitTest --no-daemon --stacktrace

      - name: Generate Kover Coverage Report
        # 生成 XML + HTML 覆盖率报告，供后续接入 PR 评论或 Codecov
        continue-on-error: true
        run: ./gradlew koverXmlReport koverHtmlReport --no-daemon

      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            app/build/reports/kover/
          retention-days: 14

      - name: Run Lint (non-blocking)
        # 静态分析：捕获未使用资源 / 缺失权限 / Compose 性能问题
        # continue-on-error=true：现有 lint 警告不阻塞发版（后续逐步清理）
        continue-on-error: true
        run: ./gradlew lintRelease --no-daemon

      - name: Upload lint reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-reports
          path: |
            app/build/reports/lint-results-*.html
            app/build/reports/lint-results-*.xml
          retention-days: 7

      - name: Show version
        run: |
          echo "Building version: ${{ needs.bump-version.outputs.version_name }} (code=${{ needs.bump-version.outputs.version_code }})"
          cat version.properties

      - name: Decode signing keystore from Secrets
        env:
          SIGNING_KEYSTORE_BASE64: ${{ secrets.SIGNING_KEYSTORE_BASE64 }}
        run: |
          mkdir -p "$HOME/.signing"
          echo "$SIGNING_KEYSTORE_BASE64" | base64 -d > "$HOME/.signing/naigen-release.jks"
          # 验证文件
          ls -la "$HOME/.signing/naigen-release.jks"
          file "$HOME/.signing/naigen-release.jks"

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build Release APK
        env:
          SIGNING_KEYSTORE_FILE: /home/runner/.signing/naigen-release.jks
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Verify APK signature
        run: |
          # 验证 APK 已用 release keystore 签名
          APK=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          echo "Verifying signature of: $APK"
          # 提取签名信息
          unzip -p "$APK" META-INF/*.RSA 2>/dev/null | keytool -printcert 2>/dev/null | head -20 || true
          # aapt dump badging 看 package 信息
          ${ANDROID_HOME}/build-tools/*/aapt dump badging "$APK" 2>/dev/null | grep -E "package|application-label" | head -5 || true

      - name: Rename APK with version
        run: |
          mkdir -p artifacts
          SEMVER="${{ needs.bump-version.outputs.semver }}"
          DATE=$(date +%Y%m%d)
          # 文件名格式: NaiGen-v{SEMVER}-release-{DATE}.apk
          # 例如: NaiGen-v2.2.0-release-20260715.apk
          find app/build/outputs/apk/release -name "*.apk" -type f | while read -r apk; do
            newname="NaiGen-v${SEMVER}-release-${DATE}.apk"
            cp "$apk" "artifacts/$newname"
            echo "✓ $apk → artifacts/$newname"
          done
          ls -la artifacts/

      - name: Generate SHA256 checksums
        run: |
          cd artifacts
          sha256sum *.apk > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          # artifact name 不能含 /，所以用纯数字 build_number
          name: apk-${{ needs.bump-version.outputs.build_number }}
          path: artifacts/*
          retention-days: 30

  # ──────────────────────────────────────────────────────────────────────────
  # Job 3：创建 Release + 上传 APK
  # ──────────────────────────────────────────────────────────────────────────
  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: [ bump-version, build ]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Download APK artifacts
        uses: actions/download-artifact@v4
        with:
          name: apk-${{ needs.bump-version.outputs.build_number }}
          path: artifacts

      - name: Verify artifacts
        run: |
          ls -la artifacts/
          test -n "$(ls artifacts/*.apk 2>/dev/null)" || { echo "❌ No APK found"; exit 1; }

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BUILD="${{ needs.bump-version.outputs.build_number }}"
          SEMVER="${{ needs.bump-version.outputs.semver }}"
          CODE="${{ needs.bump-version.outputs.version_code }}"
          DISPLAY_BUILD=$((BUILD - 20000))
          # tag 用 v{SEMVER} 格式（标准 SemVer tag）
          TAG="v${SEMVER}"

          # 检查 tag 是否已存在
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Tag $TAG already exists, skipping release creation"
            exit 0
          fi

          # 生成 release notes
          cat > release-notes.md <<EOF
          # NaiGen v${SEMVER}

          **版本号**：v${SEMVER}  （versionCode=${CODE}）
          **构建号**：第 ${DISPLAY_BUILD} 次构建（仅显示用，安卓系统识别的是 SemVer）
          **构建时间**：$(date -u '+%Y-%m-%d %H:%M:%S UTC')
          **提交**：${{ github.sha }}

          ## 版本号说明

          - **versionName**（安卓系统识别）：\`${SEMVER}\` —— 例如 \`2.2.0\`
          - **versionCode**（升级判定）：\`${CODE}\` —— 例如 \`20200\`
          - **构建号**（关于页显示）：\`${DISPLAY_BUILD}\` —— 累计构建次数

          SemVer 逢 9 自动进位：2.1.9 → 2.2.0，2.9.9 → 3.0.0

          ## 下载

          - 下方 Assets 下载 APK
          - 校验完整性请参考 \`SHA256SUMS.txt\`
          - 安装前需在手机「设置 → 安全」中允许「未知来源」

          ## 安装步骤

          1. 下载 APK 文件到手机
          2. 点击安装（需开启未知来源）
          3. 打开 App，在「设置」中填入 Nai2API Token
          4. 在「保活」页按提示开启厂商保活
          5. 回到「生成」页输入提示词开始生图

          ---
          *本 release 由 GitHub Actions 自动生成*
          EOF

          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --title "NaiGen v${SEMVER}" \
            --notes-file release-notes.md \
            --generate-notes \
            artifacts/*.apk \
            artifacts/SHA256SUMS.txt

          echo "✅ Release $TAG created successfully"
