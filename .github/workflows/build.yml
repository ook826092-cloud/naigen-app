name: Build & Release

# ─────────────────────────────────────────────────────────────────────────────
# 触发条件：仅手动触发
#   - 想发版时到 Actions 页面点 "Run workflow"
#   - 不再监听 push，避免每次提交都跑
#   - 可选输入 skip_bump 跳过版本号自增
# ─────────────────────────────────────────────────────────────────────────────
on:
  workflow_dispatch:
    inputs:
      skip_bump:
        description: '跳过版本号自增（仅本次）'
        required: false
        default: 'false'
        type: choice
        options: [ 'false', 'true' ]

permissions:
  contents: write
  actions: write

concurrency:
  group: build-release-${{ github.ref }}
  cancel-in-progress: false

# ─────────────────────────────────────────────────────────────────────────────
# 需要的 Secrets（在仓库 Settings → Secrets and variables → Actions 配置）：
#   SIGNING_KEYSTORE_BASE64  → base64 编码的 PKCS12 keystore 文件
#   SIGNING_STORE_PASSWORD   → keystore 密码
#   SIGNING_KEY_ALIAS        → key alias
#   SIGNING_KEY_PASSWORD     → key 密码
# ─────────────────────────────────────────────────────────────────────────────

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Job 1：自增版本号 + 提交回仓库
  # ──────────────────────────────────────────────────────────────────────────
  bump-version:
    name: Bump Version
    runs-on: ubuntu-latest
    outputs:
      version_name: ${{ steps.read_version.outputs.VERSION_NAME }}
      version_code: ${{ steps.read_version.outputs.VERSION_CODE }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump PATCH version +1
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.skip_bump != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash scripts/bump-version.sh --commit

      - name: Read final version
        id: read_version
        run: |
          # 用 awk 读取，避免 source 解析 properties 出问题
          MAJOR=$(awk -F= '/^VERSION_MAJOR=/{print $2}' version.properties)
          MINOR=$(awk -F= '/^VERSION_MINOR=/{print $2}' version.properties)
          PATCH=$(awk -F= '/^VERSION_PATCH=/{print $2}' version.properties)
          NAME="${MAJOR}.${MINOR}.${PATCH}"
          CODE=$((MAJOR * 10000 + MINOR * 100 + PATCH))
          echo "VERSION_NAME=$NAME" >> "$GITHUB_OUTPUT"
          echo "VERSION_CODE=$CODE" >> "$GITHUB_OUTPUT"
          echo "Final version: $NAME (code=$CODE)"

  # ──────────────────────────────────────────────────────────────────────────
  # Job 2：拉最新代码 + 编译 Debug + Release APK
  # ──────────────────────────────────────────────────────────────────────────
  build:
    name: Build APK
    runs-on: ubuntu-latest
    needs: bump-version
    steps:
      - name: Checkout (latest, including bump commit)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.9'
          cache-read-only: false

      - name: Show version
        run: |
          echo "Building version: ${{ needs.bump-version.outputs.version_name }} (code=${{ needs.bump-version.outputs.version_code }})"
          cat version.properties

      - name: Decode signing keystore from Secrets
        env:
          SIGNING_KEYSTORE_BASE64: ${{ secrets.SIGNING_KEYSTORE_BASE64 }}
        run: |
          mkdir -p "$HOME/.signing"
          echo "$SIGNING_KEYSTORE_BASE64" | base64 -d > "$HOME/.signing/naigen-release.jks"
          # 验证文件
          ls -la "$HOME/.signing/naigen-release.jks"
          file "$HOME/.signing/naigen-release.jks"

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build Release APK
        env:
          SIGNING_KEYSTORE_FILE: ${{ format('{0}/.signing/naigen-release.jks', env.HOME) }}
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Verify APK signature
        run: |
          # 验证 APK 已用 release keystore 签名
          APK=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          echo "Verifying signature of: $APK"
          # 提取签名信息
          unzip -p "$APK" META-INF/*.RSA 2>/dev/null | keytool -printcert 2>/dev/null | head -20 || true
          # aapt dump badging 看 package 信息
          ${ANDROID_HOME}/build-tools/*/aapt dump badging "$APK" 2>/dev/null | grep -E "package|application-label" | head -5 || true

      - name: Rename APK with version
        run: |
          mkdir -p artifacts
          VER="${{ needs.bump-version.outputs.version_name }}"
          DATE=$(date +%Y%m%d)
          find app/build/outputs/apk/release -name "*.apk" -type f | while read -r apk; do
            newname="NaiGen-v${VER}-release-${DATE}.apk"
            cp "$apk" "artifacts/$newname"
            echo "✓ $apk → artifacts/$newname"
          done
          ls -la artifacts/

      - name: Generate SHA256 checksums
        run: |
          cd artifacts
          sha256sum *.apk > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ needs.bump-version.outputs.version_name }}
          path: artifacts/*
          retention-days: 30

  # ──────────────────────────────────────────────────────────────────────────
  # Job 3：创建 Release + 上传 APK
  # ──────────────────────────────────────────────────────────────────────────
  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: [ bump-version, build ]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Download APK artifacts
        uses: actions/download-artifact@v4
        with:
          name: apk-${{ needs.bump-version.outputs.version_name }}
          path: artifacts

      - name: Verify artifacts
        run: |
          ls -la artifacts/
          test -n "$(ls artifacts/*.apk 2>/dev/null)" || { echo "❌ No APK found"; exit 1; }

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VER="${{ needs.bump-version.outputs.version_name }}"
          CODE="${{ needs.bump-version.outputs.version_code }}"
          TAG="v${VER}"

          # 检查 tag 是否已存在
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Tag $TAG already exists, skipping release creation"
            exit 0
          fi

          # 生成 release notes
          cat > release-notes.md <<EOF
          # NaiGen v${VER}

          **版本号**：${VER} (versionCode=${CODE})
          **构建时间**：$(date -u '+%Y-%m-%d %H:%M:%S UTC')
          **提交**：${{ github.sha }}

          ## 下载

          - 下方 Assets 中选择对应架构的 APK
          - 校验文件完整性请参考 \`SHA256SUMS.txt\`
          - 安装前需在手机「设置 → 安全」中允许「未知来源」

          ## 安装步骤

          1. 下载 APK 文件到手机
          2. 点击安装（需开启未知来源）
          3. 打开 App，在「设置」中填入 Nai2API Token
          4. 在「保活」页按提示开启厂商保活
          5. 回到「生成」页输入提示词开始生图

          ---
          *本 release 由 GitHub Actions 自动生成*
          EOF

          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --title "NaiGen v${VER}" \
            --notes-file release-notes.md \
            --generate-notes \
            artifacts/*.apk \
            artifacts/SHA256SUMS.txt

          echo "✅ Release $TAG created successfully"
